<div class="glass-panel rounded-2xl border border-white/[0.04] p-4 sm:p-5 shadow-lg">
  <div class="flex flex-col sm:flex-row gap-3 mb-4">
    <select x-model="filterType" @change="stockPage = 1"
      class="w-full sm:w-auto bg-slate-800/50 border border-slate-700/50 rounded-lg px-3 py-2.5 sm:py-2 text-sm text-slate-300 focus:outline-none focus:ring-1 focus:ring-blue-500">
      <option value="">Semua Tipe Investor</option>
      <option value="CP">Corporate (CP)</option>
      <option value="ID">Individual (ID)</option>
      <option value="IB">Investment Bank (IB)</option>
      <option value="SC">Securities Company (SC)</option>
      <option value="MF">Mutual Fund (MF)</option>
      <option value="IS">Insurance (IS)</option>
      <option value="PF">Pension Fund (PF)</option>
      <option value="OT">Others (OT)</option>
    </select>
    <select x-model="filterLF" @change="stockPage = 1"
      class="w-full sm:w-auto bg-slate-800/50 border border-slate-700/50 rounded-lg px-3 py-2.5 sm:py-2 text-sm text-slate-300 focus:outline-none focus:ring-1 focus:ring-blue-500">
      <option value="">Lokal & Asing</option>
      <option value="L">Lokal</option>
      <option value="A">Asing</option>
    </select>
  </div>

  <div class="overflow-x-auto max-h-[600px]">
    <table class="w-full text-left border-collapse">
      <thead
        class="sticky top-0 bg-slate-800/95 backdrop-blur z-10 text-xs font-semibold text-slate-400 uppercase tracking-wider">
        <tr>
          <th @click="sortStock('code')"
            class="p-4 cursor-pointer hover:text-white border-b border-slate-700 whitespace-nowrap">Kode ↕</th>
          <th @click="sortStock('issuer')" class="p-4 cursor-pointer hover:text-white border-b border-slate-700">
            Emiten ↕</th>
          <th @click="sortStock('price')"
            class="p-4 cursor-pointer hover:text-white border-b border-slate-700 text-right">Harga ↕</th>
          <th @click="sortStock('changePct')"
            class="p-4 cursor-pointer hover:text-white border-b border-slate-700 text-right">+/- ↕</th>
          <th @click="sortStock('holders')"
            class="p-4 cursor-pointer hover:text-white border-b border-slate-700 text-center">Holder ↕</th>
          <th @click="sortStock('topPct')"
            class="p-4 cursor-pointer hover:text-white border-b border-slate-700 whitespace-nowrap">Top Holder % ↕
          </th>
          <th @click="sortStock('topName')" class="p-4 cursor-pointer hover:text-white border-b border-slate-700">
            Top Holder ↕</th>
          <th @click="sortStock('localPct')"
            class="p-4 cursor-pointer hover:text-white border-b border-slate-700 text-center">Lokal % ↕</th>
        </tr>
      </thead>
      <tbody class="text-sm divide-y divide-slate-800/50">
        <template x-for="r in paginatedStocks" :key="r.code">
          <tr @click="location.hash='#/stock/'+r.code"
            class="hover:bg-slate-800/50 cursor-pointer transition-colors group">
            <td class="p-4 font-bold text-blue-400 group-hover:text-blue-300" x-text="r.code"></td>
            <td class="p-4 text-slate-300 capitalize truncate max-w-[200px]" :title="r.issuer" x-text="r.issuer">
            </td>

            <!-- Price Cols -->
            <td class="p-4 text-right font-medium">
              <span x-show="r.price !== null" x-text="fmtPrice(r.price)"
                class="text-slate-200 tabular-nums"></span>
              <span x-show="r.price === null" class="w-16 h-4 price-loading inline-block"></span>
            </td>
            <td class="p-4 text-right tabular-nums">
              <span x-show="r.changePct !== null" :class="fmtChangePct(r.changePct).cls"
                class="px-1.5 py-0.5 rounded text-xs" x-text="fmtChangePct(r.changePct).text"></span>
              <span x-show="r.changePct === null" class="w-10 h-4 price-loading inline-block"></span>
            </td>

            <td class="p-4 text-center text-slate-400 font-semibold" x-text="r.holders"></td>
            <td class="p-4">
              <div class="flex items-center gap-2">
                <div class="h-1.5 w-16 bg-slate-700 rounded-full overflow-hidden">
                  <div class="h-full bg-blue-500 rounded-full" :style="`width:${Math.min(r.topPct, 100)}%`"></div>
                </div>
                <span class="text-xs font-semibold" x-text="r.topPct + '%'"></span>
              </div>
            </td>
            <td class="p-4 text-slate-400 text-xs truncate max-w-[150px]" :title="r.topName" x-text="r.topName">
            </td>
            <td class="p-4 text-center">
              <span
                :class="r.localPct > 50 ? 'text-emerald-400 bg-emerald-400/10' : 'text-rose-400 bg-rose-400/10'"
                class="px-2 py-1 rounded text-xs font-semibold" x-text="r.localPct + '%'"></span>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>

  <!-- Pagination Controls -->
  <div class="flex justify-between items-center mt-6 pt-4 border-t border-slate-700/50"
    x-show="totalStockPages > 1">
    <span class="text-sm text-slate-500" x-text="`Hal ${stockPage} dari ${totalStockPages}`"></span>
    <div class="flex gap-1">
      <button
        class="px-3 py-1 bg-slate-800 border border-slate-700 rounded text-slate-400 hover:text-white disabled:opacity-50"
        @click="if(stockPage > 1) { stockPage--; fetchVisiblePrices(); }" :disabled="stockPage === 1">‹</button>
      <button
        class="px-3 py-1 bg-slate-800 border border-slate-700 rounded text-slate-400 hover:text-white disabled:opacity-50"
        @click="if(stockPage < totalStockPages) { stockPage++; fetchVisiblePrices(); }"
        :disabled="stockPage === totalStockPages">›</button>
    </div>
  </div>
</div>
