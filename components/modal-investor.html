<button @click="location.hash=''"
  class="mb-5 inline-flex items-center gap-2 px-4 py-2 bg-slate-800/60 hover:bg-slate-700/80 border border-slate-700/50 rounded-full text-sm font-medium text-slate-300 hover:text-white transition-all shadow-sm">
  <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
    stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
  </svg>
  Kembali ke Dashboard
</button>
<div class="glass-panel rounded-2xl p-6 border border-white/[0.04] shadow-xl">
  <template x-if="modalData">
    <div>
      <h2 class="text-2xl font-bold text-white mb-2" x-text="modalData.name"></h2>

      <div class="flex gap-2 mb-8 uppercase">
        <span class="px-2 py-1 rounded text-xs font-bold"
          :style="`background:${TYPE_COLORS[modalData.type] || '#64748b'}22; color:${TYPE_COLORS[modalData.type] || '#64748b'}`"
          x-text="TYPE_LABELS[modalData.type] || modalData.type"></span>
        <span
          :class="modalData.lf === 'L' ? 'text-emerald-400 bg-emerald-400/10' : 'text-rose-400 bg-rose-400/10'"
          class="px-2 py-1 rounded text-xs font-bold" x-text="modalData.lf === 'L' ? 'Lokal' : 'Asing'"></span>
      </div>

      <div class="flex flex-wrap gap-4 mb-4">
        <div class="glass-panel rounded-xl p-4 flex-1 min-w-[140px] border border-white/[0.04]">
          <div class="text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-2">Jumlah Emiten</div>
          <div class="text-xl font-bold text-blue-500" x-text="modalData.stocks.length"></div>
        </div>
        <div class="glass-panel rounded-xl p-4 flex-1 min-w-[140px] border border-white/[0.04]">
          <div class="text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-2">Total Lembar Saham
          </div>
          <div class="text-xl font-bold text-blue-500"
            x-text="fmtShares(modalData.stocks.reduce((sum,s) => sum+s.shares,0))"></div>
        </div>
        <div class="glass-panel rounded-xl p-4 flex-1 min-w-[140px] border border-emerald-500/20">
          <div class="text-[11px] font-semibold text-emerald-500 uppercase tracking-wider mb-2">Est. Valuasi
            Portofolio</div>
          <div class="text-xl font-bold text-emerald-400" x-text="
            (() => {
              let total = 0; let pending = false;
              for(const s of modalData.stocks) {
                  const p = priceMap[s.code];
                  if(p && p.last_price != null) { total += p.last_price * s.shares; }
                  else { pending = true; }
              }
              return pending && total === 0 ? 'Menghitung...' : (total > 0 ? 'Rp ' + fmtNum(total) : '-');
            })()
          "></div>
        </div>
      </div>

      <div class="overflow-x-auto max-h-[500px]">
        <table class="w-full text-left text-sm whitespace-nowrap">
          <thead
            class="sticky top-0 glass-panel text-xs text-slate-400 uppercase tracking-wider z-10 shadow-sm shadow-black/50">
            <tr>
              <th class="py-3 px-4 border-b border-slate-700">Kode</th>
              <th class="py-3 px-4 border-b border-slate-700">Emiten</th>
              <th class="py-3 px-4 border-b border-slate-700 text-right">Lembar</th>
              <th class="py-3 px-4 border-b border-slate-700 text-right">%</th>
              <th class="py-3 px-4 border-b border-slate-700 text-right">Harga</th>
              <th class="py-3 px-4 border-b border-slate-700 text-right text-emerald-400">Valuasi</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-800/50">
            <template x-for="s in modalData.stocks" :key="s.code">
              <tr @click="location.hash='#/stock/'+s.code" class="hover:bg-slate-800/50 cursor-pointer">
                <td class="py-3 px-4 font-bold text-blue-400" x-text="s.code"></td>
                <td class="py-3 px-4 text-slate-300 truncate max-w-[200px]" :title="s.issuer" x-text="s.issuer">
                </td>
                <td class="py-3 px-4 text-right tabular-nums text-slate-300" x-text="fmtNum(s.shares)"></td>
                <td class="py-3 px-4 text-right font-bold text-white" x-text="s.pct + '%'"></td>
                <td class="py-3 px-4 text-right">
                  <span x-show="priceMap[s.code]?.last_price" class="text-slate-300"
                    x-text="fmtPrice(priceMap[s.code]?.last_price)"></span>
                  <span x-show="!priceMap[s.code]?.last_price" class="inline-block w-8 h-4 price-loading"></span>
                </td>
                <td class="py-3 px-4 text-right font-medium text-emerald-400">
                  <span x-show="priceMap[s.code]?.last_price"
                    x-text="'Rp ' + fmtNum((priceMap[s.code]?.last_price || 0) * s.shares)"></span>
                  <span x-show="!priceMap[s.code]?.last_price" class="inline-block w-16 h-4 price-loading"></span>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
      <div class="mt-4 border-t border-white/[0.04] pt-6">
        <h3 class="text-sm font-semibold mb-4 text-slate-300">Portofolio Whale Map</h3>
        <div class="relative w-full h-[400px] bg-slate-900/40 rounded-xl border border-white/[0.04] overflow-hidden" id="modalInvestorWhaleMap"></div>
      </div>
    </div>
  </template>
</div>
