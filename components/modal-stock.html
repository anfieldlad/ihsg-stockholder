<button @click="location.hash=''"
  class="mb-5 inline-flex items-center gap-2 px-4 py-2 bg-slate-800/60 hover:bg-slate-700/80 border border-slate-700/50 rounded-full text-sm font-medium text-slate-300 hover:text-white transition-all shadow-sm">
  <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
    stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
  </svg>
  Kembali ke Dashboard
</button>
<div class="glass-panel rounded-2xl p-0 border border-white/[0.04] shadow-xl overflow-hidden">
  <template x-if="modalData">
    <div>
      <div class="p-6 pb-2">
        <h2 class="text-3xl font-extrabold text-white mb-1 tracking-tight" x-text="modalData.code"></h2>
        <p class="text-slate-400 font-medium text-sm uppercase tracking-wider mb-4" x-text="modalData.issuer"></p>

        <div class="flex items-center gap-4 mb-8 inline-flex">
          <template x-if="priceMap[modalData.code]?.last_price">
            <div class="flex items-center gap-4">
              <span class="text-[36px] font-extrabold text-white tabular-nums tracking-tight"
                x-text="'Rp ' + fmtPrice(priceMap[modalData.code].last_price)"></span>
              <span
                :class="priceMap[modalData.code].change_pct > 0 ? 'text-emerald-400 bg-emerald-400/10' : 'text-rose-400 bg-rose-400/10'"
                class="font-bold px-3 py-1 rounded-md text-[15px]"
                x-text="`${priceMap[modalData.code].change_abs > 0 ? '+' : ''}${fmtPrice(priceMap[modalData.code].change_abs)} (${fmtChangePct(priceMap[modalData.code].change_pct).text})`"></span>
              <div class="text-xs text-slate-500 font-medium flex gap-4 ml-4">
                <span
                  x-text="priceMap[modalData.code]?.market_cap ? 'MCap: Rp ' + fmtNum(priceMap[modalData.code].market_cap) : ''"></span>
                <span
                  x-text="priceMap[modalData.code]?.volume ? 'Vol: ' + fmtNum(priceMap[modalData.code].volume) : ''"></span>
              </div>
            </div>
          </template>
          <template x-if="!priceMap[modalData.code]?.last_price">
            <div class="w-48 h-8 price-loading"></div>
          </template>
        </div>

        <div class="flex flex-wrap gap-4 mb-6">
          <template x-for="stat in [
            { label: 'Holder', val: modalData.holders.length, color: 'text-blue-500' },
            { label: 'Total Saham', val: fmtShares(modalData.totalShares), color: 'text-blue-500' },
            { label: 'Total %', val: modalData.totalPct.toFixed(1) + '%', color: 'text-blue-500' },
            { label: 'Lokal %', val: modalData.localPct.toFixed(1) + '%', color: 'text-emerald-400' }
          ]">
            <div class="glass-panel rounded-xl p-4 flex-1 min-w-[200px] border border-white/[0.04] bg-slate-800/40">
              <div class="text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2" x-text="stat.label"></div>
              <div class="text-xl font-bold" :class="stat.color" x-text="stat.val"></div>
            </div>
          </template>
        </div>
      </div>

      <div class="grid lg:grid-cols-[300px_1fr] border-t border-white/[0.04]">
        <div class="flex items-center justify-center p-6 h-full min-h-[300px] border-r border-white/[0.04]">
          <canvas id="modalChart" width="240" height="240"></canvas>
        </div>
        <div class="min-w-0 overflow-x-auto max-h-[500px]">
          <table class="w-full text-left text-sm whitespace-nowrap">
            <thead
              class="sticky top-0 bg-slate-900/80 backdrop-blur text-xs text-slate-400 uppercase tracking-wider z-10 border-b border-white/[0.04] shadow-sm">
              <tr>
                <th class="py-3 px-4">Investor</th>
                <th class="py-3 px-4">Tipe</th>
                <th class="py-3 px-4">L/A</th>
                <th class="py-3 px-4 text-right">Lembar</th>
                <th class="py-3 px-4 text-right">%</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-slate-800">
              <template x-for="h in modalData.holders" :key="h.investor">
                <tr @click="location.hash='#/investor/'+encodeURIComponent(h.investor)"
                  class="hover:bg-slate-800/50 cursor-pointer transition-colors group">
                  <td class="py-3 px-4 font-bold text-blue-400 group-hover:text-blue-300 truncate max-w-[200px]"
                    :title="h.investor" x-text="h.investor"></td>
                  <td class="py-3 px-4"><span class="px-2 py-1 rounded text-[11px] font-semibold"
                      :style="`background:${TYPE_COLORS[h.investor_type] || '#64748b'}22; color:${TYPE_COLORS[h.investor_type] || '#64748b'}`"
                      x-text="TYPE_LABELS[h.investor_type] || h.investor_type"></span></td>
                  <td class="py-3 px-4"><span
                      :class="h.local_foreign === 'L' ? 'text-emerald-400 bg-emerald-400/10' : 'text-rose-400 bg-rose-400/10'"
                      class="px-2 py-1 rounded text-[11px] font-semibold"
                      x-text="h.local_foreign === 'L' ? 'Lokal' : 'Asing'"></span></td>
                  <td class="py-3 px-4 text-right tabular-nums text-slate-300" x-text="fmtShares(h.shares)"></td>
                  <td class="py-3 px-4 text-right font-bold text-white" x-text="h.percentage + '%'"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>
      <div class="border-t border-white/[0.04] p-6 bg-slate-800/20">
        <h3 class="text-sm font-semibold mb-4 text-slate-300">Hubungan Top Holder</h3>
        <div class="relative w-full h-[400px] bg-slate-900/40 rounded-xl border border-white/[0.04] overflow-hidden" id="modalStockWhaleMap"></div>
      </div>
    </div>
  </template>
</div>
