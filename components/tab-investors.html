<div class="glass-panel rounded-2xl border border-white/[0.04] p-5 shadow-lg">
  <h3 class="text-lg font-semibold mb-4 flex items-center gap-2"><span
      class="w-2 h-2 rounded-full bg-purple-500"></span>Top Investor (Total Portofolio Saham >1%)</h3>

  <div class="overflow-x-auto max-h-[600px]">
    <table class="w-full text-left border-collapse">
      <thead
        class="sticky top-0 bg-slate-800/95 backdrop-blur z-10 text-xs font-semibold text-slate-400 uppercase tracking-wider">
        <tr>
          <th class="p-4 border-b border-slate-700">#</th>
          <th @click="sortInvestor('name')" class="p-4 cursor-pointer hover:text-white border-b border-slate-700">
            Investor ↕</th>
          <th @click="sortInvestor('type')" class="p-4 cursor-pointer hover:text-white border-b border-slate-700">
            Tipe ↕</th>
          <th @click="sortInvestor('stockCount')"
            class="p-4 cursor-pointer hover:text-white border-b border-slate-700 text-center">Jml Saham ↕</th>
          <th class="p-4 border-b border-slate-700 w-1/3">Saham Portfolio</th>
        </tr>
      </thead>
      <tbody class="text-sm divide-y divide-slate-800/50">
        <template x-for="(r, i) in paginatedInvestors" :key="r.name">
          <tr @click="location.hash='#/investor/'+encodeURIComponent(r.name)"
            class="hover:bg-slate-800/50 cursor-pointer transition-colors">
            <td class="p-4 text-slate-500" x-text="((investorPage-1)*pageSize) + i + 1"></td>
            <td class="p-4 font-medium text-slate-200 truncate max-w-[250px]" :title="r.name" x-text="r.name">
            </td>
            <td class="p-4">
              <span class="px-2 py-1 rounded text-[11px] font-semibold border border-transparent"
                :style="`background:${TYPE_COLORS[r.type] || '#64748b'}22; color:${TYPE_COLORS[r.type] || '#64748b'}`"
                x-text="TYPE_LABELS[r.type] || r.type"></span>
            </td>
            <td class="p-4 text-center font-bold text-amber-500" x-text="r.stockCount"></td>
            <td class="p-4 text-xs text-slate-400 truncate max-w-[200px]" :title="r.stocks" x-text="r.stocks">
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>

  <div class="flex justify-between items-center mt-6 pt-4 border-t border-slate-700/50"
    x-show="totalInvestorPages > 1">
    <span class="text-sm text-slate-500" x-text="`Hal ${investorPage} dari ${totalInvestorPages}`"></span>
    <div class="flex gap-1">
      <button
        class="px-3 py-1 bg-slate-800 border border-slate-700 rounded text-slate-400 hover:text-white disabled:opacity-50"
        @click="if(investorPage > 1) investorPage--" :disabled="investorPage === 1">‹</button>
      <button
        class="px-3 py-1 bg-slate-800 border border-slate-700 rounded text-slate-400 hover:text-white disabled:opacity-50"
        @click="if(investorPage < totalInvestorPages) investorPage++"
        :disabled="investorPage === totalInvestorPages">›</button>
    </div>
  </div>
</div>
